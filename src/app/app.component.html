<app-header />

<main>
  <div id="dashboard">
    <app-dashboard-item
      [imageData]="{ src: 'status.png', alt: 'signal symbol' }"
      ,
      title="Server Status"
    >
      <app-server-status />
    </app-dashboard-item>

    <app-dashboard-item
      [imageData]="{ src: 'globe.png', alt: 'A globe' }"
      ,
      title="Traffic"
    >
      <app-traffic />
    </app-dashboard-item>

    <app-dashboard-item
      [imageData]="{ src: 'list.png', alt: 'A List of items' }"
      ,
      title="Support tickets"
    >
      <app-tickets />
    </app-dashboard-item>
  </div>
</main>
