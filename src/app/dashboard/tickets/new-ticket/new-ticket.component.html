<form (ngSubmit)="onSubmit(titleInput)" #form>
  <app-control label="Title">
    <input name="title" id="title" #titleInput #input />
  </app-control>
  <app-control class="control" label="Request">
    <textarea name="request" id="request" rows="3" #input></textarea>
  </app-control>
  <p>
    <button appButton>
      Submit
      <span ngProjectAs="icon"> ⌲ </span>
    </button>
  </p>
</form>
